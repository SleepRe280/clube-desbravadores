# Blueprint Render: https://render.com/docs/blueprint-spec
# Ajuste `name` dos serviços se quiser outros identificadores no painel.
#
# E-mail (opcional no painel Environment): MAIL_SERVER, MAIL_PORT (587), MAIL_USE_TLS=1,
# MAIL_USE_SSL=0, MAIL_USERNAME, MAIL_PASSWORD, MAIL_DEFAULT_SENDER — necessário para
# recuperação de senha por e-mail em produção (cadastro de responsáveis é imediato).

databases:
  - name: primeiro-homem-db
    plan: free
    databaseName: primeiro_homem

services:
  - type: web
    name: primeiro-homem-web
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements-prod.txt
    startCommand: gunicorn -w 1 --timeout 120 -b 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: TRUST_PROXY
        value: "1"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: PREFERRED_URL_SCHEME
        value: https
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: primeiro-homem-db
          property: connectionString

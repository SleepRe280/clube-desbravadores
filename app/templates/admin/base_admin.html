<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{% block title %}Gestão{% endblock %} — Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="admin-shell">
    <input type="checkbox" id="admin-nav-toggle" class="admin-nav-toggle" aria-hidden="true" tabindex="-1" />

    <header class="admin-topbar lg:hidden">
      <label for="admin-nav-toggle" class="admin-menu-btn" aria-label="Abrir ou fechar menu">☰</label>
      <span class="font-bold text-slate-900 truncate">Painel — Diretoria</span>
    </header>

    <label for="admin-nav-toggle" class="admin-overlay" aria-hidden="true"></label>

    <aside class="admin-sidebar">
      <div class="p-5 border-b border-slate-100 shrink-0">
        <div class="flex gap-1 mb-2">
          <span class="h-1.5 flex-1 rounded-full bg-red-400"></span>
          <span class="h-1.5 flex-1 rounded-full bg-green-400"></span>
          <span class="h-1.5 flex-1 rounded-full bg-blue-400"></span>
        </div>
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Painel</p>
        <p class="font-bold text-slate-900">Diretoria</p>
      </div>
      <nav class="p-3 space-y-0.5 flex-1 text-sm overflow-y-auto">
        <a
          href="{{ url_for('admin.dashboard') }}"
          class="block rounded-lg px-3 py-2.5 min-h-[44px] flex items-center hover:bg-red-50 text-slate-700 {% if request.endpoint == 'admin.dashboard' %}bg-red-50 text-red-800 font-medium{% endif %}"
          >Início & mapa</a
        >
        <a
          href="{{ url_for('admin.agenda_list') }}"
          class="block rounded-lg px-3 py-2.5 min-h-[44px] flex items-center hover:bg-indigo-50 text-slate-700 {% if request.endpoint in ['admin.agenda_list', 'admin.agenda_new', 'admin.agenda_edit'] %}bg-indigo-50 text-indigo-900 font-medium{% endif %}"
          >Agenda</a
        >
        <a
          href="{{ url_for('admin.members') }}"
          class="block rounded-lg px-3 py-2.5 min-h-[44px] flex items-center hover:bg-green-50 text-slate-700 {% if request.endpoint in ['admin.members', 'admin.member_new', 'admin.member_edit', 'admin.member_activity', 'admin.member_attendance'] %}bg-green-50 text-green-800 font-medium{% endif %}"
          >Desbravadores</a
        >
        <a
          href="{{ url_for('admin.directorate_list') }}"
          class="block rounded-lg px-3 py-2.5 min-h-[44px] flex items-center hover:bg-violet-50 text-slate-700 {% if request.endpoint in ['admin.directorate_list', 'admin.directorate_new', 'admin.directorate_edit'] %}bg-violet-50 text-violet-900 font-medium{% endif %}"
          >Equipe da diretoria</a
        >
        <a
          href="{{ url_for('admin.parents_list') }}"
          class="block rounded-lg px-3 py-2.5 min-h-[44px] flex items-center hover:bg-blue-50 text-slate-700 {% if request.endpoint in ['admin.parents_list', 'admin.parent_detail'] %}bg-blue-50 text-blue-800 font-medium{% endif %}"
          >Responsáveis</a
        >
        <a
          href="{{ url_for('admin.attendance_overview') }}"
          class="block rounded-lg px-3 py-2.5 min-h-[44px] flex items-center hover:bg-emerald-50 text-slate-700 {% if request.endpoint == 'admin.attendance_overview' %}bg-emerald-50 text-emerald-800 font-medium{% endif %}"
          >Presenças</a
        >
        <a
          href="{{ url_for('admin.posts') }}"
          class="block rounded-lg px-3 py-2.5 min-h-[44px] flex items-center hover:bg-amber-50 text-slate-700 {% if request.endpoint in ['admin.posts', 'admin.post_new'] %}bg-amber-50 text-amber-900 font-medium{% endif %}"
          >Avisos do clube</a
        >
        <a
          href="{{ url_for('admin.club_news_list') }}"
          class="block rounded-lg px-3 py-2.5 min-h-[44px] flex items-center hover:bg-sky-50 text-slate-700 {% if 'club_news' in (request.endpoint or '') %}bg-sky-50 text-sky-900 font-medium{% endif %}"
          >Notícias Desbravadores</a
        >
      </nav>
      <div class="p-4 border-t border-slate-100 text-xs text-slate-500 shrink-0">
        <p class="truncate">{{ current_user.email }}</p>
        <a href="{{ url_for('auth.logout') }}" class="text-blue-600 hover:underline mt-2 inline-block min-h-[44px] inline-flex items-center">Sair</a>
      </div>
    </aside>

    <main class="admin-main">
      {% include "partials/flash.html" %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{% block title %}Gestão{% endblock %} — Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      body.admin-shell {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        letter-spacing: -0.01em;
      }
    </style>
  </head>
  <body class="admin-shell">
    <input type="checkbox" id="admin-nav-toggle" class="admin-nav-toggle" aria-hidden="true" tabindex="-1" />

    <header class="admin-topbar lg:hidden">
      <label for="admin-nav-toggle" class="admin-menu-btn" aria-label="Abrir ou fechar menu">&#9776;</label>
      <span class="font-bold text-[var(--text-primary)] truncate">Painel — Diretoria</span>
    </header>

    <label for="admin-nav-toggle" class="admin-overlay" aria-hidden="true"></label>

    <aside class="admin-sidebar">
      <div class="p-5 border-b border-[var(--border-subtle)] shrink-0 bg-white/90">
        <div class="flex gap-1 mb-3 rounded-full overflow-hidden h-1.5" aria-hidden="true">
          <span class="flex-1 bg-[#CFE8D8]"></span>
          <span class="flex-1 bg-[#F6E7B4]"></span>
          <span class="flex-1 bg-[#F4C7A1]"></span>
          <span class="flex-1 bg-[#F2C1C1]"></span>
          <span class="flex-1 bg-[#D6CCE8]"></span>
          <span class="flex-1 bg-[#C9E0F2]"></span>
        </div>
        <p class="text-[11px] font-semibold text-[var(--text-muted)] uppercase tracking-[0.14em]">Painel</p>
        <p class="font-bold text-[var(--text-primary)] text-lg mt-0.5">Diretoria</p>
      </div>
      <nav class="p-3 space-y-1 flex-1 text-sm overflow-y-auto">
        <a
          href="{{ url_for('admin.dashboard') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if request.endpoint == 'admin.dashboard' %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--inicio" aria-hidden="true">🏠</span><span>Início e mapa</span></a
        >
        <a
          href="{{ url_for('admin.agenda_list') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if request.endpoint in ['admin.agenda_list', 'admin.agenda_new', 'admin.agenda_edit'] %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--agenda" aria-hidden="true">📅</span><span>Agenda</span></a
        >
        <a
          href="{{ url_for('admin.members') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if request.endpoint in ['admin.members', 'admin.member_new', 'admin.member_edit', 'admin.member_activity', 'admin.member_attendance'] %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--desbravadores" aria-hidden="true">👥</span><span>Desbravadores</span></a
        >
        <a
          href="{{ url_for('admin.directorate_list') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if request.endpoint in ['admin.directorate_list', 'admin.directorate_new', 'admin.directorate_edit'] %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--diretoria" aria-hidden="true">✦</span><span>Equipe da diretoria</span></a
        >
        <a
          href="{{ url_for('admin.parents_list') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if request.endpoint in ['admin.parents_list', 'admin.parent_detail'] %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--responsaveis" aria-hidden="true">👪</span><span>Responsáveis</span></a
        >
        <a
          href="{{ url_for('admin.attendance_overview') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if request.endpoint == 'admin.attendance_overview' %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--presencas" aria-hidden="true">✓</span><span>Presenças</span></a
        >
        <a
          href="{{ url_for('admin.finance_dashboard') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if request.endpoint in ['admin.finance_dashboard', 'admin.finance_ledger_add', 'admin.finance_ledger_delete', 'admin.finance_fee_add', 'admin.finance_fee_mark_paid', 'admin.finance_fee_delete'] %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--financeiro" aria-hidden="true">💰</span><span>Financeiro</span></a
        >
        <a
          href="{{ url_for('admin.posts') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if request.endpoint in ['admin.posts', 'admin.post_new'] %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--avisos" aria-hidden="true">📢</span><span>Avisos do clube</span></a
        >
        <a
          href="{{ url_for('admin.club_news_list') }}"
          class="admin-nav-link flex items-center gap-2.5 rounded-2xl px-3 py-2.5 min-h-[44px] {% if 'club_news' in (request.endpoint or '') %}admin-nav-link--active{% else %}text-[var(--text-secondary)]{% endif %}"
          ><span class="admin-nav-icon admin-nav-icon--noticias" aria-hidden="true">📰</span><span>Notícias Desbravadores</span></a
        >
      </nav>
      <div class="p-4 border-t border-[var(--border-subtle)] text-xs text-[var(--text-secondary)] shrink-0 bg-[#f8f8f9]">
        <p class="truncate">{{ current_user.email }}</p>
        <a href="{{ url_for('auth.logout') }}" class="ui-btn ui-btn--logout mt-3">Sair</a>
      </div>
    </aside>

    <main class="admin-main">
      {% include "partials/flash.html" %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>

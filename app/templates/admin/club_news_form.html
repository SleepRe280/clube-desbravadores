{% extends "admin/base_admin.html" %}
{% block title %}Notícia{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold">{% if item %}Editar{% else %}Nova{% endif %} notícia</h1>
<form method="post" enctype="multipart/form-data" class="mt-6 max-w-2xl space-y-4 bg-white rounded-xl border border-slate-200 p-6">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Nível</label>
    <select name="level" class="w-full rounded-lg border px-3 py-2 bg-white">
      {% for code, label in levels %}
      <option value="{{ code }}" {% if item and item.level == code %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Título</label>
    <input name="title" required value="{{ item.title if item else '' }}" class="w-full rounded-lg border px-3 py-2" />
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Texto</label>
    <textarea name="body" rows="10" required class="w-full rounded-lg border px-3 py-2">{{ item.body if item else '' }}</textarea>
  </div>
  <div class="border border-dashed rounded-lg p-4 bg-slate-50">
    <label class="block text-sm font-medium mb-2">Imagem (opcional)</label>
    {% if item and item.image_filename %}
    <img src="{{ url_for('uploaded_file', rel_path=item.image_filename) }}" class="max-h-40 rounded-lg mb-2" alt="" />
    <label class="text-sm"><input type="checkbox" name="remove_image" value="1" /> Remover imagem</label>
    {% endif %}
    <input type="file" name="image" accept="image/*" class="mt-2 w-full text-sm" />
  </div>
  <div class="flex gap-3">
    <button type="submit" class="rounded-xl bg-sky-600 text-white px-6 py-2.5 font-semibold">Salvar</button>
    <a href="{{ url_for('admin.club_news_list') }}" class="rounded-xl border px-6 py-2.5">Voltar</a>
  </div>
</form>
{% endblock %}

<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{% block title %}Clube{% endblock %} — Família</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        min-height: 100%;
        min-height: 100dvh;
      }
    </style>
  </head>
  <body class="parent-app antialiased flex flex-col h-full min-h-[100dvh] text-slate-800">
    <header class="parent-header shrink-0 z-30 shadow-[0_1px_0_rgba(15,23,42,0.06)]">
      <div class="w-full max-w-6xl mx-auto px-3 sm:px-6 lg:px-8 py-2 sm:py-2.5 flex items-center gap-2 sm:gap-3">
        <a href="{{ url_for('parent.home') }}" class="flex items-center gap-2 font-bold text-[var(--text-primary)] tracking-tight min-w-0">
          <span
            class="flex h-8 w-8 sm:h-9 sm:w-9 shrink-0 items-center justify-center rounded-xl bg-gradient-to-br from-[#e91e63] via-[#4caf50] to-[#03a9f4] text-white text-[10px] sm:text-xs font-black shadow-md"
            >DC</span
          >
          <span class="hidden sm:block leading-tight text-left min-w-0">
            <span class="block text-[10px] font-semibold uppercase tracking-widest text-[var(--text-muted)]">Duque De Caxias</span>
            <span class="block text-xs sm:text-sm text-[var(--text-secondary)]">Portal família</span>
          </span>
        </a>

        <div class="flex-1 min-w-0 flex justify-end items-center gap-1.5 sm:gap-3">
          <p class="hidden md:block text-right min-w-0">
            <span class="block text-xs text-slate-500 truncate max-w-[10rem] xl:max-w-xs">{{ current_user.full_name or 'Responsável' }}</span>
            <span class="block text-[10px] text-slate-400 truncate max-w-[10rem] xl:max-w-xs">{{ current_user.email }}</span>
          </p>
          <a
            href="{{ url_for('auth.logout') }}"
            class="shrink-0 inline-flex items-center justify-center gap-1 rounded-2xl border-2 border-[#f8bbd0] bg-[#ffebee] px-2.5 py-1.5 sm:px-3 sm:py-2 text-[11px] sm:text-sm font-semibold text-[#c2185b] shadow-sm hover:bg-[#fce4ec] min-h-[40px] transition"
            title="Sair e voltar ao login"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 sm:h-4 sm:w-4 opacity-70 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="hidden sm:inline">Sair</span>
          </a>
        </div>
      </div>
    </header>

    <main class="flex-1 flex flex-col w-full min-h-0">
      <div class="parent-main-wrap">
        <div class="parent-panel">
          {% include "partials/flash.html" %}
          {% block content %}{% endblock %}
        </div>
      </div>
    </main>

    <nav class="parent-bottom-nav parent-bottom-nav--compact" aria-label="Navegação principal">
      <div class="max-w-6xl mx-auto px-0.5 grid grid-cols-7 gap-0.5 sm:gap-1 py-1 sm:py-1.5">
        <a
          href="{{ url_for('parent.home') }}"
          class="flex flex-col items-center justify-center gap-0 rounded-xl px-0.5 py-1 min-h-[40px] sm:min-h-[44px] text-[9px] sm:text-[10px] font-medium transition text-center leading-tight {% if request.endpoint == 'parent.home' %}text-[var(--nav-inicio-fg)] bg-[var(--nav-inicio-bg)]{% else %}text-[var(--text-secondary)] hover:bg-white/80{% endif %}"
        >
          <span class="text-sm sm:text-base leading-none" aria-hidden="true">⌂</span>
          Feed
        </a>
        <a
          href="{{ url_for('parent.parent_agenda') }}"
          class="flex flex-col items-center justify-center gap-0 rounded-xl px-0.5 py-1 min-h-[40px] sm:min-h-[44px] text-[9px] sm:text-[10px] font-medium transition text-center leading-tight {% if request.endpoint == 'parent.parent_agenda' %}text-[var(--nav-agenda-fg)] bg-[var(--nav-agenda-bg)]{% else %}text-[var(--text-secondary)] hover:bg-white/80{% endif %}"
        >
          <span class="text-sm sm:text-base leading-none" aria-hidden="true">📅</span>
          Agenda
        </a>
        <a
          href="{{ url_for('parent.club_directory') }}"
          class="flex flex-col items-center justify-center gap-0 rounded-xl px-0.5 py-1 min-h-[40px] sm:min-h-[44px] text-[9px] sm:text-[10px] font-medium transition text-center leading-tight {% if request.endpoint == 'parent.club_directory' %}text-[var(--nav-desbravadores-fg)] bg-[var(--nav-desbravadores-bg)]{% else %}text-[var(--text-secondary)] hover:bg-white/80{% endif %}"
        >
          <span class="text-sm sm:text-base leading-none" aria-hidden="true">👥</span>
          Membros
        </a>
        <a
          href="{{ url_for('parent.news_feed') }}"
          class="flex flex-col items-center justify-center gap-0 rounded-xl px-0.5 py-1 min-h-[40px] sm:min-h-[44px] text-[8px] sm:text-[10px] font-medium transition text-center leading-tight {% if request.endpoint == 'parent.news_feed' %}text-[var(--nav-noticias-fg)] bg-[var(--nav-noticias-bg)]{% else %}text-[var(--text-secondary)] hover:bg-white/80{% endif %}"
        >
          <span class="text-sm sm:text-base leading-none" aria-hidden="true">📰</span>
          Notícias
        </a>
        <a
          href="{{ url_for('parent.parent_finance') }}"
          class="flex flex-col items-center justify-center gap-0 rounded-xl px-0.5 py-1 min-h-[40px] sm:min-h-[44px] text-[8px] sm:text-[10px] font-medium transition text-center leading-tight {% if request.endpoint == 'parent.parent_finance' %}text-[var(--nav-finance-fg)] bg-[var(--nav-finance-bg)]{% else %}text-[var(--text-secondary)] hover:bg-white/80{% endif %}"
        >
          <span class="text-sm sm:text-base leading-none" aria-hidden="true">💰</span>
          Pagamentos
        </a>
        <a
          href="{{ url_for('parent.club_directorate') }}"
          class="flex flex-col items-center justify-center gap-0 rounded-xl px-0.5 py-1 min-h-[40px] sm:min-h-[44px] text-[9px] sm:text-[10px] font-medium transition text-center leading-tight {% if request.endpoint == 'parent.club_directorate' %}text-[var(--nav-diretoria-fg)] bg-[var(--nav-diretoria-bg)]{% else %}text-[var(--text-secondary)] hover:bg-white/80{% endif %}"
        >
          <span class="text-sm sm:text-base leading-none" aria-hidden="true">★</span>
          Liderança
        </a>
        <a
          href="{{ url_for('parent.account') }}"
          class="flex flex-col items-center justify-center gap-0 rounded-xl px-0.5 py-1 min-h-[40px] sm:min-h-[44px] text-[9px] sm:text-[10px] font-medium transition text-center leading-tight {% if request.endpoint == 'parent.account' %}text-[var(--text-primary)] bg-[#ede7f6]{% else %}text-[var(--text-secondary)] hover:bg-white/80{% endif %}"
        >
          <span class="text-sm sm:text-base leading-none" aria-hidden="true">⚙</span>
          Conta
        </a>
      </div>
    </nav>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nova senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        color: var(--text-primary);
        background: linear-gradient(160deg, #e8f5e9 0%, #fff8e1 100%);
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-3xl border border-[var(--border-pastel)] shadow-[var(--shadow-card)] p-8">
      <h1 class="text-xl font-bold text-[var(--text-primary)]">Definir nova senha</h1>
      {% include "partials/flash.html" %}
      <form method="post" class="mt-6 space-y-4">
        <div>
          <label class="block text-sm text-[var(--text-secondary)] mb-1">Nova senha</label>
          <div class="relative">
            <input
              id="np1"
              type="password"
              name="password"
              required
              minlength="6"
              class="w-full rounded-2xl border border-[var(--border-pastel)] pl-4 pr-14 py-3 bg-[#fafafa]"
            />
            <button type="button" class="js-pw-toggle absolute right-2 top-1/2 -translate-y-1/2 text-xs font-semibold text-[var(--text-secondary)] px-2 py-1 rounded-xl hover:bg-[#e8f5e9]" data-target="np1">Ver</button>
          </div>
        </div>
        <div>
          <label class="block text-sm text-[var(--text-secondary)] mb-1">Confirmar</label>
          <div class="relative">
            <input
              id="np2"
              type="password"
              name="password2"
              required
              minlength="6"
              class="w-full rounded-2xl border border-[var(--border-pastel)] pl-4 pr-14 py-3 bg-[#fafafa]"
            />
            <button type="button" class="js-pw-toggle absolute right-2 top-1/2 -translate-y-1/2 text-xs font-semibold text-[var(--text-secondary)] px-2 py-1 rounded-xl hover:bg-[#e8f5e9]" data-target="np2">Ver</button>
          </div>
        </div>
        <button type="submit" class="w-full py-3.5 rounded-2xl bg-[#4caf50] text-white font-semibold hover:bg-[#43a047]">Salvar</button>
      </form>
    </div>
    <script>
      document.querySelectorAll(".js-pw-toggle").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var id = btn.getAttribute("data-target");
          var input = document.getElementById(id);
          if (!input) return;
          var show = input.type === "password";
          input.type = show ? "text" : "password";
          btn.textContent = show ? "Ocultar" : "Ver";
        });
      });
    </script>
  </body>
</html>

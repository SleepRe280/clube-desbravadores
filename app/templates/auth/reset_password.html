<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nova senha</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow p-8">
      <h1 class="text-xl font-bold text-slate-900">Definir nova senha</h1>
      {% include "partials/flash.html" %}
      <form method="post" class="mt-6 space-y-4">
        <div>
          <label class="block text-sm text-slate-600 mb-1">Nova senha</label>
          <input type="password" name="password" required minlength="6" class="w-full rounded-xl border px-4 py-3" />
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1">Confirmar</label>
          <input type="password" name="password2" required minlength="6" class="w-full rounded-xl border px-4 py-3" />
        </div>
        <button type="submit" class="w-full py-3 rounded-xl bg-green-600 text-white font-semibold">Salvar</button>
      </form>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Esqueci a senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        color: var(--text-primary);
        background: linear-gradient(135deg, #ffebee 0%, #e1f5fe 50%, #e8f5e9 100%);
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-3xl border border-[var(--border-pastel)] shadow-[var(--shadow-card)] p-8">
      <h1 class="text-xl font-bold text-[var(--text-primary)]">Recuperar senha</h1>
      <p class="text-[var(--text-secondary)] text-sm mt-2 leading-relaxed">
        Informe o e-mail da sua conta de <strong>responsável</strong>. Se existir cadastro, enviaremos um link para
        redefinir a senha (quando o e-mail estiver configurado no servidor).
      </p>
      {% include "partials/flash.html" %}
      <form method="post" class="mt-6 space-y-4">
        <input
          type="email"
          name="email"
          required
          placeholder="seu@email.com"
          class="w-full rounded-2xl border border-[var(--border-pastel)] px-4 py-3 bg-[#fafafa]"
        />
        <button type="submit" class="ui-btn ui-btn--info ui-btn--block">Continuar</button>
      </form>
      <a href="{{ url_for('auth.login') }}" class="text-sm text-[var(--text-muted)] hover:underline mt-4 inline-block font-medium">← Voltar ao login</a>
    </div>
  </body>
</html>

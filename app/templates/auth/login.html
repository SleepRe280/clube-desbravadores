<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Entrar — Portal do clube</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }
      .auth-visual::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        background: linear-gradient(
          135deg,
          rgba(15, 81, 50, 0.72) 0%,
          rgba(13, 99, 90, 0.45) 45%,
          rgba(30, 64, 175, 0.35) 100%
        );
      }
    </style>
  </head>
  <body class="auth-shell antialiased flex flex-col lg:flex-row min-h-screen min-h-[100dvh] bg-emerald-950">
    <div class="auth-visual relative order-2 lg:order-1 lg:flex-[1.15] min-h-[220px] sm:min-h-[280px] lg:min-h-0 overflow-hidden">
      <img
        src="{{ url_for('static', filename='img/login-nature.jpg') }}"
        alt=""
        class="absolute inset-0 h-full w-full object-cover object-center scale-105"
        decoding="async"
      />
      <div class="absolute inset-0 z-[2] flex flex-col justify-end p-6 sm:p-10 lg:p-12 text-white pb-8 lg:pb-14">
        <p class="text-[11px] font-bold uppercase tracking-[0.2em] text-emerald-100/90">Duque de Caxias</p>
        <h1 class="mt-2 text-2xl sm:text-3xl lg:text-4xl font-bold tracking-tight text-white drop-shadow-sm">
          Portal do clube
        </h1>
        <p class="mt-3 max-w-md text-sm sm:text-base text-emerald-50/95 leading-relaxed">
          Clube de Desbravadores — acompanhamento e gestão num só lugar.
        </p>
      </div>
    </div>

    <div
      class="order-1 lg:order-2 flex flex-1 flex-col justify-center px-5 py-8 sm:px-8 sm:py-10 lg:px-12 lg:py-16 bg-gradient-to-b from-emerald-50 via-white to-sky-50/80"
    >
      <div class="mx-auto w-full max-w-[420px]">
        <div
          class="rounded-3xl border border-[var(--border-pastel)] bg-white/95 text-[var(--text-primary)] p-7 sm:p-9 shadow-xl shadow-slate-200/60"
        >
          <div class="flex gap-1 mb-6">
            <span class="h-2 w-7 rounded-full bg-[#e91e63]/80"></span>
            <span class="h-2 w-7 rounded-full bg-[#4caf50]/80"></span>
            <span class="h-2 w-7 rounded-full bg-[#03a9f4]/80"></span>
          </div>

          <h2 class="text-xl font-semibold text-[var(--text-primary)]">Entrar</h2>
          <p class="text-sm mt-1 text-[var(--text-secondary)]">E-mail e senha</p>

          {% include "partials/flash.html" %}

          <form method="post" class="mt-6 space-y-4">
            {% if next_url %}
            <input type="hidden" name="next" value="{{ next_url }}" />
            {% endif %}
            <div>
              <label class="block text-xs font-medium text-[var(--text-muted)] uppercase tracking-wide mb-1.5"
                >E-mail</label
              >
              <input
                name="email"
                type="email"
                autocomplete="email"
                required
                class="w-full rounded-2xl border border-[var(--border-pastel)] bg-[#fafafa] px-4 py-3 text-[var(--text-primary)] focus:border-[#7e57c2] focus:ring-2 focus:ring-[#f3e5f5] outline-none transition"
              />
            </div>
            <div>
              <label class="block text-xs font-medium text-[var(--text-muted)] uppercase tracking-wide mb-1.5"
                >Senha</label
              >
              <div class="relative">
                <input
                  id="login-password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  required
                  class="w-full rounded-2xl border border-[var(--border-pastel)] bg-[#fafafa] pl-4 pr-12 py-3 text-[var(--text-primary)] focus:border-[#4caf50] focus:ring-2 focus:ring-[#e8f5e9] outline-none transition"
                />
                <button
                  type="button"
                  id="toggle-password"
                  class="ui-btn ui-btn--text ui-btn--sm absolute right-1 top-1/2 -translate-y-1/2 min-h-[40px]"
                  aria-label="Mostrar ou ocultar senha"
                  aria-pressed="false"
                >
                  Ver
                </button>
              </div>
            </div>
            <button type="submit" class="ui-btn ui-btn--brand ui-btn--block">Entrar</button>
          </form>

          <p class="text-center mt-4 text-sm">
            <a href="{{ url_for('auth.forgot_password') }}" class="text-[#0277bd] font-medium hover:underline"
              >Esqueci minha senha</a
            >
            <span class="text-[var(--text-muted)] mx-2">·</span>
            <a href="{{ url_for('auth.register') }}" class="text-[#2e7d32] font-medium hover:underline">Criar conta</a>
          </p>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var input = document.getElementById("login-password");
        var btn = document.getElementById("toggle-password");
        if (!input || !btn) return;
        btn.addEventListener("click", function () {
          var show = input.type === "password";
          input.type = show ? "text" : "password";
          btn.textContent = show ? "Ocultar" : "Ver";
          btn.setAttribute("aria-pressed", show ? "true" : "false");
        });
      })();
    </script>
  </body>
</html>

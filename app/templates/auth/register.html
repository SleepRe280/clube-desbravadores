<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Criar conta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        color: var(--text-primary);
        background: linear-gradient(165deg, #f5f3fa 0%, #e8f5e9 50%, #fff8e1 100%);
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="p-6">
    <div class="max-w-md mx-auto pt-6">
      <a href="{{ url_for('auth.login') }}" class="text-[#0277bd] text-sm font-semibold hover:underline">← Login</a>
      <h1 class="text-2xl font-bold mt-6 text-[var(--text-primary)]">Criar conta de responsável</h1>
      <p class="text-[var(--text-secondary)] text-sm mt-2">
        Após registrar, você já poderá <strong>entrar no portal</strong> com e-mail e senha. A diretoria associa seu
        filho à conta ao cadastrar o desbravador.
      </p>
      <div class="mt-6 bg-white rounded-3xl border border-[var(--border-pastel)] shadow-[var(--shadow-card)] p-8">
        {% include "partials/flash.html" %}
        <form method="post" class="space-y-4">
          <div>
            <label class="block text-sm text-[var(--text-secondary)] mb-1">Nome</label>
            <input name="full_name" required class="w-full rounded-2xl border border-[var(--border-pastel)] px-4 py-3 bg-[#fafafa]" />
          </div>
          <div>
            <label class="block text-sm text-[var(--text-secondary)] mb-1">E-mail</label>
            <input name="email" type="email" required class="w-full rounded-2xl border border-[var(--border-pastel)] px-4 py-3 bg-[#fafafa]" />
          </div>
          <div>
            <label class="block text-sm text-[var(--text-secondary)] mb-1">Senha (mín. 6)</label>
            <div class="relative">
              <input
                id="reg-password"
                name="password"
                type="password"
                required
                minlength="6"
                class="w-full rounded-2xl border border-[var(--border-pastel)] pl-4 pr-14 py-3 bg-[#fafafa]"
              />
              <button
                type="button"
                id="reg-toggle-pw"
                class="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-semibold text-[var(--text-secondary)] px-2 py-1 rounded-xl hover:bg-[#e8f5e9]"
              >
                Ver
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="w-full py-3.5 rounded-2xl font-semibold text-white bg-gradient-to-r from-[#7e57c2] to-[#03a9f4] shadow-md hover:opacity-95"
          >
            Criar conta
          </button>
        </form>
      </div>
    </div>
    <script>
      (function () {
        var i = document.getElementById("reg-password");
        var b = document.getElementById("reg-toggle-pw");
        if (!i || !b) return;
        b.addEventListener("click", function () {
          var show = i.type === "password";
          i.type = show ? "text" : "password";
          b.textContent = show ? "Ocultar" : "Ver";
        });
      })();
    </script>
  </body>
</html>
